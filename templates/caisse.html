<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLogic-M_CNSS_DML - Caisse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; }
        .sidebar { min-height: 100vh; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d); }
        .sidebar .nav-link { color: white; }
        .sidebar .nav-link:hover { background: rgba(255,255,255,0.2); }
        .solde { font-size: 48px; font-weight: bold; }
        .btn-loading { opacity: 0.7; pointer-events: none; position: relative; }
        .btn-loading::after { content: ""; position: absolute; width: 16px; height: 16px; top: 50%; right: 15px; margin-top: -8px; border: 2px solid white; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar">
                <div class="p-3 text-center"><h4 class="text-white">📊 MediLogic-M_CNSS_DML</h4><hr class="bg-light"></div>
                <nav class="nav flex-column">
                    <a class="nav-link py-3 px-4" href="/"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                    <a class="nav-link py-3 px-4" href="/membres"><i class="fas fa-users me-2"></i> Membres</a>
                    <a class="nav-link py-3 px-4" href="/cotisations"><i class="fas fa-money-bill me-2"></i> Cotisations</a>
                    <a class="nav-link py-3 px-4 active" href="/caisse"><i class="fas fa-box me-2"></i> Caisse</a>
                    <a class="nav-link py-3 px-4" href="/historique"><i class="fas fa-history me-2"></i> Historique</a>
                </nav>
            </div>
            
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1><i class="fas fa-box me-2"></i>Gestion de caisse</h1>
                    <div class="d-flex align-items-center gap-3"><div id="userInfo"></div><button class="btn btn-danger btn-sm" onclick="deconnexion()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button></div>
                </div>
                
                <div class="card bg-info text-white mb-4"><div class="card-body text-center"><h5>💰 Solde actuel</h5><div class="solde" id="solde">- FCFA</div></div></div>
                
                <div class="card"><div class="card-header bg-danger text-white"><i class="fas fa-arrow-down"></i> Décaissement</div><div class="card-body"><div class="row"><div class="col-md-4"><input type="number" id="montant" class="form-control" placeholder="Montant à décaisser"></div><div class="col-md-5"><input type="text" id="motif" class="form-control" placeholder="Motif du décaissement *"></div><div class="col-md-3"><button class="btn btn-danger w-100 admin-only" id="btnDecaisser" onclick="decaisser()"><i class="fas fa-arrow-down"></i> Décaisser</button></div></div><div id="message" class="mt-2"></div></div></div>
                
                <div class="card mt-4"><div class="card-header bg-secondary text-white">📜 Dernières opérations</div><div class="card-body"><div class="table-responsive"><table class="table table-striped"><thead><tr><th>Date</th><th>Type</th><th>Montant</th><th>Motif</th><th>Effectué par</th></tr></thead><tbody id="operations"></tbody></table></div></div></div>
            </div>
        </div>
    </div>
    
    <script>
        let userRole = '';
        
        function afficherUser() { fetch('/api/session').then(res => res.json()).then(data => { if(data.logged_in) { userRole = data.role; document.getElementById('userInfo').innerHTML = `${data.role === 'admin' ? '👑' : '👤'} ${data.nom}`; if(data.role !== 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none'); } }); }
        
        function chargerSolde() { fetch('/api/caisse/solde').then(res => res.json()).then(data => document.getElementById('solde').innerText = data.solde + ' FCFA'); }
        
        function chargerOperations() { fetch('/api/caisse/operations').then(res => res.json()).then(data => { let html = ''; data.forEach(op => { html += `<tr><td>${new Date(op.date_operation).toLocaleString()}</td><td class="${op.type === 'entree' ? 'text-success' : 'text-danger'}">${op.type === 'entree' ? '⬆️ Entrée' : '⬇️ Sortie'}</td><td>${op.montant} FCFA</td><td>${op.motif || '-'}</td><td>${op.effectue_par || '-'}</td></tr>`; }); document.getElementById('operations').innerHTML = html; }); }
        
        function decaisser() {
            let btn = document.getElementById('btnDecaisser');
            let montant = parseFloat(document.getElementById('montant').value);
            let motif = document.getElementById('motif').value;
            if(!montant || !motif) { document.getElementById('message').innerHTML = '<div class="alert alert-danger">Remplissez tous les champs</div>'; return; }
            if(confirm(`⚠️ Décaissement de ${montant} FCFA\nMotif: ${motif}\nConfirmer ?`)) {
                btn.disabled = true; btn.classList.add('btn-loading'); btn.innerHTML = '⏳ Traitement...';
                fetch('/api/caisse/sortie', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ montant: montant, motif: motif }) })
                .then(res => res.json()).then(data => { if(data.success) { document.getElementById('message').innerHTML = '<div class="alert alert-success">✅ ' + data.message + '</div>'; document.getElementById('montant').value = ''; document.getElementById('motif').value = ''; chargerSolde(); chargerOperations(); } else { document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ ' + data.message + '</div>'; } btn.disabled = false; btn.classList.remove('btn-loading'); btn.innerHTML = '<i class="fas fa-arrow-down"></i> Décaisser'; });
            }
        }
        
        function deconnexion() { fetch('/api/logout', {method: 'POST'}).then(() => window.location.href = '/login'); }
        
        afficherUser();
        chargerSolde();
        chargerOperations();
        setInterval(chargerSolde, 10000);
    </script>
</body>
</html>
