<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLogic - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Effet de particules animées */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 1%, transparent 1%);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
        }

        @keyframes moveBackground {
            from { transform: translateY(0px); }
            to { transform: translateY(50px); }
        }

        /* Carte principale */
        .login-card {
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Header */
        .card-header-custom {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
            border-bottom: none;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #fdbb4d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .card-header-custom h3 {
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .card-header-custom p {
            opacity: 0.8;
            font-size: 0.85rem;
            margin: 0;
        }

        /* Tabs modernes */
        .custom-tabs {
            display: flex;
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.5rem;
            border-radius: 60px;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 0.9rem;
            color: #64748b;
        }

        .tab-btn i {
            margin-right: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: #e2e8f0;
            color: #1e293b;
        }

        /* Formulaires */
        .form-container {
            padding: 0.5rem 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .form-label i {
            margin-right: 8px;
            color: #667eea;
        }

        .input-group-custom {
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            z-index: 1;
        }

        .form-control-modern {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 45px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.3s;
            background: white;
        }

        .form-control-modern:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Boutons */
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Loading state */
        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            top: 50%;
            right: 20px;
            margin-top: -9px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert messages */
        .alert-custom {
            border-radius: 16px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            animation: slideDown 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-custom i {
            font-size: 1.2rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Lien inscription */
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .register-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Footer */
        .card-footer-custom {
            background: #f8fafc;
            padding: 1rem;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* Animation d'entrée */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="login-card animate-in">
        <div class="card-header-custom">
            <div class="logo-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h3>MediLogic</h3>
            <p>CNSS du Maritime Lacs - Assurance santé mutualiste</p>
        </div>
        
        <div class="card-body p-4">
            <!-- Message d'alerte -->
            <div id="message"></div>

            <!-- Tabs de connexion -->
            <div class="custom-tabs">
                <button class="tab-btn active" data-tab="admin" onclick="switchTab('admin')">
                    <i class="fas fa-user-shield"></i> Administrateur
                </button>
                <button class="tab-btn" data-tab="membre" onclick="switchTab('membre')">
                    <i class="fas fa-user"></i> Membre
                </button>
            </div>

            <!-- Formulaire Admin -->
            <div id="formAdmin" class="form-container">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user-circle"></i> Identifiant
                    </label>
                    <div class="input-group-custom">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="adminUsername" class="form-control-modern" placeholder="Entrez votre identifiant">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="input-group-custom">
                        <i class="fas fa-key"></i>
                        <input type="password" id="adminPassword" class="form-control-modern" placeholder="Entrez votre mot de passe">
                    </div>
                </div>
                <button class="btn-login" id="btnAdminLogin" onclick="connexionAdmin()">
                    <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                </button>
            </div>

            <!-- Formulaire Membre -->
            <div id="formMembre" class="form-container" style="display: none;">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fab fa-whatsapp"></i> Numéro WhatsApp
                    </label>
                    <div class="input-group-custom">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="membreTelephone" class="form-control-modern" placeholder="Ex: 90123456">
                    </div>
                    <small class="text-muted" style="font-size: 0.7rem;">Format: 90123456 (sans indication pays)</small>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="input-group-custom">
                        <i class="fas fa-key"></i>
                        <input type="password" id="membrePassword" class="form-control-modern" placeholder="Entrez votre mot de passe">
                    </div>
                </div>
                <button class="btn-login" id="btnMembreLogin" onclick="connexionMembre()">
                    <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                </button>
            </div>

            <!-- Lien inscription -->
            <div class="register-link">
                <a href="/inscription">
                    <i class="fas fa-user-plus me-2"></i>Nouveau membre ? S'inscrire
                </a>
            </div>
        </div>

        <div class="card-footer-custom">
            <i class="fas fa-lock me-1"></i> Connexion sécurisée | Plateforme mutualiste
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // Mettre à jour les boutons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            
            // Afficher le bon formulaire
            document.getElementById('formAdmin').style.display = tab === 'admin' ? 'block' : 'none';
            document.getElementById('formMembre').style.display = tab === 'membre' ? 'block' : 'none';
            
            // Nettoyer les messages
            document.getElementById('message').innerHTML = '';
        }
        
        function showMessage(type, text) {
            const icons = {
                success: 'fa-check-circle',
                danger: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `
                <div class="alert alert-${type} alert-custom">
                    <i class="fas ${icons[type] || 'fa-info-circle'}"></i>
                    <span>${text}</span>
                </div>
            `;
            setTimeout(() => {
                if (msgDiv.innerHTML === `<div class="alert alert-${type} alert-custom">
                    <i class="fas ${icons[type] || 'fa-info-circle'}"></i>
                    <span>${text}</span>
                </div>`) {
                    msgDiv.innerHTML = '';
                }
            }, 5000);
        }
        
        function connexionAdmin() {
            let btn = document.getElementById('btnAdminLogin');
            let username = document.getElementById('adminUsername').value.trim();
            let password = document.getElementById('adminPassword').value;
            
            if (!username || !password) {
                showMessage('danger', 'Veuillez remplir tous les champs');
                return;
            }
            
            btn.disabled = true;
            btn.classList.add('btn-loading');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Connexion en cours...';
            
            fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, password: password})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    showMessage('success', 'Connexion réussie ! Redirection en cours...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage('danger', '❌ Identifiants incorrects');
                    btn.disabled = false;
                    btn.classList.remove('btn-loading');
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Se connecter';
                }
            })
            .catch(() => {
                showMessage('danger', '❌ Erreur de connexion au serveur');
                btn.disabled = false;
                btn.classList.remove('btn-loading');
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Se connecter';
            });
        }
        
        function connexionMembre() {
            let btn = document.getElementById('btnMembreLogin');
            let telephone = document.getElementById('membreTelephone').value.trim();
            let motDePasse = document.getElementById('membrePassword').value;
            
            if (!telephone || !motDePasse) {
                showMessage('danger', 'Veuillez remplir tous les champs');
                return;
            }
            
            if (!/^\d{8,9}$/.test(telephone.replace(/\s/g, ''))) {
                showMessage('danger', 'Format de téléphone invalide (8 à 9 chiffres)');
                return;
            }
            
            btn.disabled = true;
            btn.classList.add('btn-loading');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Connexion en cours...';
            
            fetch('/api/membre/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({telephone: telephone, mot_de_passe: motDePasse})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    showMessage('success', `✅ Bienvenue ${data.nom} ! Redirection en cours...`);
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    showMessage('danger', '❌ ' + (data.message || 'Identifiants incorrects'));
                    btn.disabled = false;
                    btn.classList.remove('btn-loading');
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Se connecter';
                }
            })
            .catch(() => {
                showMessage('danger', '❌ Erreur de connexion au serveur');
                btn.disabled = false;
                btn.classList.remove('btn-loading');
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Se connecter';
            });
        }
        
        // Support Enter key
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') connexionAdmin();
        });
        document.getElementById('membrePassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') connexionMembre();
        });
        
        // Animation initiale
        document.querySelector('.login-card').style.opacity = '0';
        setTimeout(() => {
            document.querySelector('.login-card').style.opacity = '1';
        }, 100);
    </script>
</body>
</html>
