<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLogic-M_CNSS_DML - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 20px; }
        .nav-tabs .nav-link { color: #495057; }
        .nav-tabs .nav-link.active { background: #007bff; color: white; border: none; }
        .btn-loading { opacity: 0.7; pointer-events: none; position: relative; }
        .btn-loading::after { content: ""; position: absolute; width: 16px; height: 16px; top: 50%; right: 15px; margin-top: -8px; border: 2px solid white; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center">
                        <h3><i class="fas fa-building"></i> MediLogic-M_CNSS_DML</h3>
                        <p>CNSS du Maritime Lacs</p>
                    </div>
                    <div class="card-body">
                        <ul class="nav nav-tabs mb-3">
                            <li class="nav-item"><a class="nav-link active" data-tab="admin">👑 Administrateur</a></li>
                            <li class="nav-item"><a class="nav-link" data-tab="membre">👤 Membre</a></li>
                        </ul>
                        <div id="message"></div>
                        
                        <div id="formAdmin">
                            <div class="mb-3"><label>👨‍💼 Identifiant</label><input type="text" id="adminUsername" class="form-control" placeholder="....."></div>
                            <div class="mb-3"><label>🔒 Mot de passe</label><input type="password" id="adminPassword" class="form-control" placeholder="....."></div>
                            <button class="btn btn-primary w-100" id="btnAdminLogin" onclick="connexionAdmin()">Se connecter</button>
                        </div>
                        
                        <div id="formMembre" style="display:none">
                            <div class="mb-3"><label>📱 Numéro WhatsApp</label><input type="tel" id="membreTelephone" class="form-control" placeholder="90123456"></div>
                            <button class="btn btn-success w-100" id="btnMembreLogin" onclick="connexionMembre()">Se connecter</button>
                        </div>
                        
                        <hr>
                        <p class="text-center"><a href="/inscription">📝 Nouveau membre ? S'inscrire</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('.nav-link').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-link').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                let type = this.getAttribute('data-tab');
                document.getElementById('formAdmin').style.display = type === 'admin' ? 'block' : 'none';
                document.getElementById('formMembre').style.display = type === 'membre' ? 'block' : 'none';
            });
        });
        
        function connexionAdmin() {
            let btn = document.getElementById('btnAdminLogin');
            let username = document.getElementById('adminUsername').value;
            let password = document.getElementById('adminPassword').value;
            
            btn.disabled = true;
            btn.classList.add('btn-loading');
            btn.innerHTML = '⏳ Connexion...';
            
            fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, password: password})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) { window.location.href = '/'; }
                else {
                    document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ Identifiants incorrects</div>';
                    btn.disabled = false;
                    btn.classList.remove('btn-loading');
                    btn.innerHTML = 'Se connecter';
                }
            })
            .catch(() => {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ Erreur de connexion</div>';
                btn.disabled = false;
                btn.classList.remove('btn-loading');
                btn.innerHTML = 'Se connecter';
            });
        }
        
function connexionMembre() {
    let btn = document.getElementById('btnMembreLogin');
    let telephone = document.getElementById('membreTelephone').value;
    
    btn.disabled = true;
    btn.classList.add('btn-loading');
    btn.innerHTML = '⏳ Connexion...';
    
    fetch('/api/membre/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({telephone: telephone})
    })
    .then(res => res.json())
    .then(data => {
        if(data.success) {
            document.getElementById('message').innerHTML = '<div class="alert alert-success">✅ Bienvenue ' + data.nom + ' ! Redirection...</div>';
            setTimeout(() => {
                window.location.href = data.redirect;  // ← Redirige correctement
            }, 1000);
        } else {
            document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ ' + data.message + '</div>';
            btn.disabled = false;
            btn.classList.remove('btn-loading');
            btn.innerHTML = 'Se connecter';
        }
    })
    .catch(() => {
        document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ Erreur de connexion</div>';
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        btn.innerHTML = 'Se connecter';
    });
}

    </script>
</body>
</html>
