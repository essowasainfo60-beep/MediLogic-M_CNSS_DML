<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLogic-M_CNSS_DML - Membres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; }
        .sidebar { min-height: 100vh; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d); }
        .sidebar .nav-link { color: white; }
        .sidebar .nav-link:hover { background: rgba(255,255,255,0.2); }
        .btn-loading { opacity: 0.7; pointer-events: none; position: relative; }
        .btn-loading::after { content: ""; position: absolute; width: 16px; height: 16px; top: 50%; right: 15px; margin-top: -8px; border: 2px solid white; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media print {
            .sidebar, .btn, .no-print, .card-header .btn, .admin-only, #message, .btn-danger, .btn-warning, .btn-success {
                display: none !important;
            }
            .card { margin: 0; padding: 0; border: none; box-shadow: none; }
            .card-header { background: white !important; color: black !important; border-bottom: 2px solid #000; }
            .container-fluid { padding: 0; margin: 0; }
            .col-md-10 { width: 100%; margin: 0; padding: 0; }
            body { background: white; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #ddd; padding: 8px; }
            th { background: #f2f2f2; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar">
                <div class="p-3 text-center"><h4 class="text-white">📊 MediLogic-M_CNSS_DML</h4><hr class="bg-light"></div>
                <nav class="nav flex-column">
                    <a class="nav-link py-3 px-4" href="/"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                    <a class="nav-link py-3 px-4 active" href="/membres"><i class="fas fa-users me-2"></i> Membres</a>
                    <a class="nav-link py-3 px-4" href="/cotisations"><i class="fas fa-money-bill me-2"></i> Cotisations</a>
                    <a class="nav-link py-3 px-4" href="/caisse"><i class="fas fa-box me-2"></i> Caisse</a>
                    <a class="nav-link py-3 px-4" href="/historique"><i class="fas fa-history me-2"></i> Historique</a>
                </nav>
            </div>
            
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1><i class="fas fa-users me-2"></i>Gestion des membres</h1>
                    <div class="d-flex align-items-center gap-3">
                        <div id="userInfo"></div>
                        <button class="btn btn-primary btn-sm no-print" onclick="window.print()"><i class="fas fa-print"></i> Imprimer PDF</button>
                        <button class="btn btn-danger btn-sm no-print" onclick="deconnexion()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                    </div>
                </div>
                
                <!-- Formulaire ajout -->
                <div class="card mb-4 no-print">
                    <div class="card-header bg-primary text-white">➕ Ajouter un membre</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3 mb-2"><input type="text" id="nom" class="form-control" placeholder="Nom complet"></div>
                            <div class="col-md-2 mb-2"><input type="tel" id="telephone" class="form-control" placeholder="Téléphone"></div>
                            <div class="col-md-2 mb-2"><input type="number" id="fraisAdhesion" class="form-control" placeholder="Adhésion" value="4000"></div>
                            <div class="col-md-3 mb-2"><input type="date" id="dateInscription" class="form-control" value="2026-01-01"></div>
                            <div class="col-md-2 mb-2"><button class="btn btn-success w-100 admin-only" id="btnAjouter" onclick="ajouterMembre()"><i class="fas fa-save"></i> Ajouter</button></div>
                        </div>
                        <div id="message" class="mt-2"></div>
                    </div>
                </div>
                
                <!-- Liste des membres -->
                <div class="card">
                    <div class="card-header bg-secondary text-white">📋 Liste des membres</div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nom</th>
                                        <th>Téléphone</th>
                                        <th>Date inscription</th>
                                        <th>Adhésion</th>
                                        <th>Statut</th>
                                        <th class="no-print">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="listeMembres"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let userRole = '';
        
        function afficherUser() {
            fetch('/api/session').then(res => res.json()).then(data => {
                if(data.logged_in) {
                    userRole = data.role;
                    let roleIcon = data.role === 'admin' ? '👑' : '👤';
                    document.getElementById('userInfo').innerHTML = `${roleIcon} ${data.nom} (${data.role === 'admin' ? 'Admin' : 'Membre'})`;
                    if(data.role !== 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                }
            });
        }
        
        function chargerMembres() {
            fetch('/api/membres')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.forEach(m => {
                        let dateInscription = m.date_inscription ? new Date(m.date_inscription).toLocaleDateString('fr-FR') : '-';
                        
                        let adhesionHtml = '';
                        if(m.adhesion_statut === 'payé') {
                            adhesionHtml = '<span class="text-success">✅ Payé</span>';
                        } else if(m.adhesion_statut === 'partiel') {
                            adhesionHtml = `<span class="text-warning">🟡 Partiel (${m.frais_adhesion_paye}/4000)</span>
                                            <button class="btn btn-sm btn-warning ms-2 no-print" onclick="payerAdhesion(${m.id})">Payer</button>`;
                        } else {
                            adhesionHtml = `<span class="text-danger">❌ Impayé</span>
                                            <button class="btn btn-sm btn-warning ms-2 no-print" onclick="payerAdhesion(${m.id})">Payer</button>`;
                        }
                        
                        html += `<tr>
                            <td>${m.id}</td>
                            <td>${m.nom}</td>
                            <td>${m.telephone}</td>
                            <td>${dateInscription}
                                <button class="btn btn-sm btn-outline-secondary ms-2 no-print" onclick="modifierDateMembre(${m.id})" title="Modifier date">
                                    <i class="fas fa-calendar-alt"></i>
                                </button>
                            </td class="text-success">
                            <td id="adhesion-${m.id}">${adhesionHtml}</td class="text-success">
                            <td id="statut-${m.id}">Chargement...</td class="text-success">
                            ${userRole === 'admin' ? `<td class="no-print"><button class="btn btn-danger btn-sm admin-only" onclick="supprimerMembre(${m.id})"><i class="fas fa-trash"></i></button></td>` : '<td class="no-print"></td>'}
                        </tr>`;
                        
                        fetch(`/api/membre/statut/${m.id}`).then(res => res.json()).then(statut => {
                            let statutHtml = statut.actuel === 'À jour' ? '<span class="text-success">✅ À jour</span>' : `<span class="text-danger">❌ En retard (${statut.mois_retard} mois)</span>`;
                            document.getElementById(`statut-${m.id}`).innerHTML = statutHtml;
                        });
                    });
                    document.getElementById('listeMembres').innerHTML = html;
                });
        }
        
        function ajouterMembre() {
            let btn = document.getElementById('btnAjouter');
            let nom = document.getElementById('nom').value;
            let telephone = document.getElementById('telephone').value;
            let fraisAdhesion = document.getElementById('fraisAdhesion').value;
            let dateInscription = document.getElementById('dateInscription').value;
            
            if(!nom || !telephone) { 
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Remplissez tous les champs</div>'; 
                return; 
            }
            
            btn.disabled = true; 
            btn.classList.add('btn-loading'); 
            btn.innerHTML = '⏳ Enregistrement...';
            
            fetch('/api/membres', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({
                    nom, 
                    telephone, 
                    frais_adhesion: parseInt(fraisAdhesion), 
                    date_inscription: dateInscription
                }) 
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) { 
                    document.getElementById('message').innerHTML = '<div class="alert alert-success">✅ Membre ajouté !</div>'; 
                    document.getElementById('nom').value = ''; 
                    document.getElementById('telephone').value = ''; 
                    chargerMembres(); 
                } else { 
                    document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ ' + data.message + '</div>'; 
                }
                btn.disabled = false; 
                btn.classList.remove('btn-loading'); 
                btn.innerHTML = '<i class="fas fa-save"></i> Ajouter';
            }).catch(() => { 
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Erreur</div>'; 
                btn.disabled = false; 
                btn.classList.remove('btn-loading'); 
                btn.innerHTML = '<i class="fas fa-save"></i> Ajouter';
            });
        }
        
        function payerAdhesion(id) {
            let montant = prompt("Montant à payer pour l'adhésion:", "4000");
            if(montant && !isNaN(montant) && parseInt(montant) > 0) {
                fetch('/api/payer_adhesion', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id_membre: id, montant: parseInt(montant)})
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        alert('✅ ' + data.message);
                        chargerMembres();
                    } else {
                        alert('❌ ' + data.message);
                    }
                });
            }
        }
        
        function modifierDateMembre(id) {
            let nouvelleDate = prompt("Entrez la nouvelle date d'inscription (YYYY-MM-DD):", "2026-01-01");
            if(nouvelleDate && nouvelleDate.match(/^\d{4}-\d{2}-\d{2}$/)) {
                fetch(`/api/membres/${id}/date`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({date_inscription: nouvelleDate})
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        alert('✅ Date modifiée !');
                        chargerMembres();
                    } else {
                        alert('❌ ' + data.message);
                    }
                });
            } else if(nouvelleDate) {
                alert('❌ Format invalide. Utilisez YYYY-MM-DD (ex: 2026-01-15)');
            }
        }
        
        function supprimerMembre(id) { 
            if(confirm('Supprimer ce membre ?')) { 
                fetch(`/api/membres/${id}`, {method: 'DELETE'}).then(() => chargerMembres()); 
            } 
        }
        
        function deconnexion() { 
            fetch('/api/logout', {method: 'POST'}).then(() => window.location.href = '/login'); 
        }
        
        afficherUser();
        chargerMembres();
    </script>
</body>
</html>
